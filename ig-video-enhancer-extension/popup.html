<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG Video Enhancer Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="settings-container">
    <!-- Header -->
    <header class="settings-header">
      <div class="logo-area">
        <img src="icons/icon48.png" alt="Logo" class="logo-img">
        <div class="title-desc">
          <h1>FALO IG 影片控制助手</h1>
          <p class="subtitle">Instagram Video Enhancer</p>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="settings-main">
      <!-- Row 1: Feature Switches (3 Cards Side-by-Side) -->
      <div class="switches-row">
        <!-- Feature 1: Progress Bar -->
        <div class="switch-card">
          <h3>顯示進度條</h3>
          <label class="switch">
            <input type="checkbox" id="toggle-progress">
            <span class="slider"></span>
          </label>
        </div>

        <!-- Feature 2: Remote Control -->
        <div class="switch-card">
          <h3>顯示遙控器</h3>
          <label class="switch">
            <input type="checkbox" id="toggle-remote">
            <span class="slider"></span>
          </label>
        </div>

        <!-- Feature 3: Keyboard Shortcuts -->
        <div class="switch-card">
          <h3>鍵盤快捷鍵</h3>
          <label class="switch">
            <input type="checkbox" id="toggle-shortcuts">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Row 2: Adjusters (Speed Select & Volume Slider Side-by-Side) -->
      <div class="adjusters-row">
        <!-- Speed Setting -->
        <div class="adjuster-card card-speed">
          <h3>預設速度</h3>
          <div class="select-wrapper">
            <select id="select-speed">
              <option value="0.5">0.5x</option>
              <option value="1.0">1.0x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2.0">2.0x</option>
            </select>
          </div>
        </div>

        <!-- Volume Setting -->
        <div class="adjuster-card card-volume">
          <h3>預設音量: <span id="volume-val">80%</span></h3>
          <div class="range-wrapper">
            <input type="range" id="slider-volume" min="0" max="1" step="0.05" value="0.8">
          </div>
        </div>
      </div>

      <!-- Divider -->
      <hr class="divider">

      <!-- Shortcuts Guide -->
      <div class="shortcuts-guide">
        <h3>⌨️ 遙控器熱鍵速查</h3>
        <div class="guide-grid">
          <div class="guide-item"><kbd>1</kbd> <span>播放/暫停</span></div>
          <div class="guide-item"><kbd>2</kbd> <span>音量 -5%</span></div>
          <div class="guide-item"><kbd>3</kbd> <span>音量 +5%</span></div>
          <div class="guide-item"><kbd>4</kbd> <span>靜音切換</span></div>
          <div class="guide-item"><kbd>5</kbd> <span>倍速減慢</span></div>
          <div class="guide-item"><kbd>6</kbd> <span>倍速加快</span></div>
          <div class="guide-item"><kbd>←</kbd> <span>倒帶 5秒</span></div>
          <div class="guide-item"><kbd>→</kbd> <span>快進 5秒</span></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="settings-footer">
      <p>版本 1.0.1 | Falo x Force Cheng 2026/6/8</p>
      <p style="margin-top: 4px; margin-bottom: 0;">
        <a href="https://falo-taiwan.github.io/ig/" target="_blank" style="color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 8.5px; letter-spacing: 0.2px; transition: color 0.2s;">
          專案網址 https://falo-taiwan.github.io/ig/
        </a>
      </p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
